<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - MISSION CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a12;
            --surface: #0d1321;
            --surface2: #111827;
            --border: #1e2d45;
            --accent: #00d4ff;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container .icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .logo-container h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        .logo-container p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent);
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent);
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .switch-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="logo-container">
            <div class="icon">
                <svg fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24" width="28" height="28">
                    <path d="M2 12h3M19 12h3M12 2v3M12 19v3"></path>
                    <circle cx="12" cy="12" r="7"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
            <h1>MISSION<br>CONTROL</h1>
            <p>Create an operator account</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>User Name</label>
                <input type="text" name="username" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="company" required placeholder="Acme Corp">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <input type="password" name="password" id="password" required placeholder="Create password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
                </div>
            </div>

            <script>
                function togglePassword() {
                    const pwd = document.getElementById('password');
                    const btn = document.querySelector('.password-toggle');
                    if (pwd.type === 'password') {
                        pwd.type = 'text';
                        btn.textContent = 'Hide';
                    } else {
                        pwd.type = 'password';
                        btn.textContent = 'Show';
                    }
                }
            </script>

            <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="switch-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

</body>

</html>
