<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Surveillance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_modern.css') }}">
</head>
<body>
    <div class="page-container">
        <div class="overlay"></div>
        <div class="content-wrapper">
            <!-- Left Section -->
            <section class="hero-section">
                <h1>AI Surveillance<br>System</h1>
                <p>Monitor and secure your environment 24/7 with intelligent detection, real-time analytics, and automated security protocols.</p>
            </section>

            <!-- Right Section -->
            <section class="login-section">
                <div class="login-card">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Enter your credentials to access the console</p>

                    {% if error %}
                    <div class="error-msg">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/login" autocomplete="on">
                        <div class="form-group">
                            <label for="email">Email / Username</label>
                            <div class="input-wrapper">
                                <input type="email" name="email" id="email" required placeholder="operator@system.ai">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper has-toggle">
                                <input type="password" name="password" id="password" required placeholder="••••••••">
                                <button type="button" class="password-toggle-btn" onclick="togglePassword('password')">
                                    <i data-lucide="eye" id="toggle-icon-password" style="width: 18px; height: 18px;"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="login-btn">Login to System</button>
                    </form>

                    <div style="text-align: center; margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                        New operator? <a href="/signup" style="color: var(--violet); text-decoration: none; font-weight: 600;">Create account</a>
                    </div>
                </div>
            </section>
        </div>

    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Micro-interactions & Password toggle script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.transition = 'opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
            }, 100);
        });

        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById('toggle-icon-' + id);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
